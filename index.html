<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bjorn Verbakel | Portfolio</title>

    <script src="scripts/index.js" defer></script>

    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/style.css">
</head>

<body>
    <section id="hero">
        <div class="top-l"></div>
        <div class="top">
            <!-- This image is not visible and only to set the row height equal -->
            <img src="assets/img/name.svg" alt="Name">
        </div>
        <div class="top-r"></div>
        <div class="name-l"></div>
        <div class="name">
            <img src="assets/img/name.svg" alt="Name">
        </div>
        <div class="name-r"></div>
        <div class="side-l"></div>
        <div class="main">
            <div class="portfolio">
                <img src="assets/img/star-lines.svg" alt="Graphic">
                <div class="portfolio-text">Portfolio</div>
            </div>
            <ul>
                <li>Info</li>
                <li>Projects</li>
                <li>Contact</li>
            </ul>
        </div>
        <div class="side-r"></div>
    </section>
    <div id="content">
        <div class="side-l"></div>
        <div class="main">
            <h1>Info</h1>
        </div>
        <div class="side-r"></div>
    </div>

</html>
